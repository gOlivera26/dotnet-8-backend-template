name: .NET 8 Web API CI/CD - BackendTemplate

on:
  push:
    branches: [ "master", "main", "Development" ]
  pull_request:
    branches: [ "master", "main", "Development" ]

jobs:
  build-and-process:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore BackendTemplate.API/BackendTemplate.API.csproj

    - name: Build
      run: dotnet build BackendTemplate.API/BackendTemplate.API.csproj --no-restore --configuration Release

    - name: Publish
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      run: dotnet publish BackendTemplate.API/BackendTemplate.API.csproj -c Release -o ./publish

    - name: Upload Build Artifact
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: BackendTemplateAPI-Release
        path: ./publish
        retention-days: 5
